name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ‚îÄ‚îÄ‚îÄ Gate: CI must pass first ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ‚îÄ‚îÄ‚îÄ Deploy: Frontend Web (Vercel) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ inputs.environment == 'production' && secrets.VERCEL_PROJECT_ID_WEB_PRODUCTION || secrets.VERCEL_PROJECT_ID_WEB_STAGING }}
        run: |
          npm i -g vercel@latest
          if [ "${{ inputs.environment }}" = "production" ]; then
            URL=$(vercel deploy --prod --token=$VERCEL_TOKEN --yes)
          else
            URL=$(vercel deploy --token=$VERCEL_TOKEN --yes)
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Save deploy evidence
        run: |
          mkdir -p evidence
          echo "web_url=${{ steps.deploy.outputs.url }}" >> evidence/deploy-web.txt
          echo "environment=${{ inputs.environment }}" >> evidence/deploy-web.txt
          echo "sha=${{ github.sha }}" >> evidence/deploy-web.txt
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> evidence/deploy-web.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-web-${{ inputs.environment }}
          path: evidence/

  # ‚îÄ‚îÄ‚îÄ Deploy: Frontend Docs (Vercel) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  deploy-docs:
    name: Deploy Docs (Vercel)
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ inputs.environment == 'production' && secrets.VERCEL_PROJECT_ID_DOCS_PRODUCTION || secrets.VERCEL_PROJECT_ID_DOCS_STAGING }}
        run: |
          npm i -g vercel@latest
          if [ "${{ inputs.environment }}" = "production" ]; then
            URL=$(vercel deploy --prod --token=$VERCEL_TOKEN --yes)
          else
            URL=$(vercel deploy --token=$VERCEL_TOKEN --yes)
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Save deploy evidence
        run: |
          mkdir -p evidence
          echo "docs_url=${{ steps.deploy.outputs.url }}" >> evidence/deploy-docs.txt
          echo "environment=${{ inputs.environment }}" >> evidence/deploy-docs.txt
          echo "sha=${{ github.sha }}" >> evidence/deploy-docs.txt
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> evidence/deploy-docs.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-docs-${{ inputs.environment }}
          path: evidence/

  # ‚îÄ‚îÄ‚îÄ Deploy: Backend (Railway) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service sovereign-api --detach
      - name: Deploy Worker Orchestrator
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service sovereign-worker-orchestrator --detach
      - name: Deploy Worker Browser
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service sovereign-worker-browser --detach
      - name: Deploy Gateway MCP
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service sovereign-gateway-mcp --detach
      - name: Save deploy evidence
        run: |
          mkdir -p evidence
          echo "services=api,worker-orchestrator,worker-browser,gateway-mcp" >> evidence/deploy-backend.txt
          echo "environment=${{ inputs.environment }}" >> evidence/deploy-backend.txt
          echo "sha=${{ github.sha }}" >> evidence/deploy-backend.txt
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> evidence/deploy-backend.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-backend-${{ inputs.environment }}
          path: evidence/

  # ‚îÄ‚îÄ‚îÄ Post-deploy: Run migrations ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  post-deploy:
    name: Post-Deploy Migrations
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build DB package
        run: pnpm build --filter=@sovereign/db...
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate
      - name: Save migration evidence
        run: |
          mkdir -p evidence
          echo "migration=success" >> evidence/migration.txt
          echo "environment=${{ inputs.environment }}" >> evidence/migration.txt
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> evidence/migration.txt
      - uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-migration-${{ inputs.environment }}
          path: evidence/

  # ‚îÄ‚îÄ‚îÄ Smoke Tests ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-docs, deploy-backend, post-deploy]
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke checks
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          mkdir -p evidence

          echo "=== Smoke Tests: ${{ inputs.environment }} ===" | tee evidence/smoke.txt
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a evidence/smoke.txt
          echo "SHA: ${{ github.sha }}" | tee -a evidence/smoke.txt
          echo "" | tee -a evidence/smoke.txt

          # Health check
          echo "--- GET ${API_BASE_URL}/health ---" | tee -a evidence/smoke.txt
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "${API_BASE_URL}/health" || echo "000")
          echo "Status: ${HTTP_CODE}" | tee -a evidence/smoke.txt
          cat /tmp/health.json >> evidence/smoke.txt 2>/dev/null || true
          echo "" | tee -a evidence/smoke.txt

          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: Health check returned ${HTTP_CODE}" | tee -a evidence/smoke.txt
            exit 1
          fi

          # Web app reachable
          echo "--- GET ${APP_BASE_URL} ---" | tee -a evidence/smoke.txt
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${APP_BASE_URL}" || echo "000")
          echo "Status: ${HTTP_CODE}" | tee -a evidence/smoke.txt
          echo "" | tee -a evidence/smoke.txt

          echo "PASS: All smoke checks passed" | tee -a evidence/smoke.txt

      - uses: actions/upload-artifact@v4
        with:
          name: smoke-evidence-${{ inputs.environment }}
          path: evidence/
