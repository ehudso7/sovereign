name: Railway Backend Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

concurrency:
  group: railway-backend-${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: [ci]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy API
        env:
          RAILWAY_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RAILWAY_TOKEN_PRODUCTION || secrets.RAILWAY_TOKEN_STAGING || secrets.RAILWAY_TOKEN }}
        run: railway up --service @sovereign/api --detach
      - name: Deploy Worker Orchestrator
        env:
          RAILWAY_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RAILWAY_TOKEN_PRODUCTION || secrets.RAILWAY_TOKEN_STAGING || secrets.RAILWAY_TOKEN }}
        run: railway up --service @sovereign/worker-orchestrator --detach
      - name: Deploy Worker Browser
        env:
          RAILWAY_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RAILWAY_TOKEN_PRODUCTION || secrets.RAILWAY_TOKEN_STAGING || secrets.RAILWAY_TOKEN }}
        run: railway up --service @sovereign/worker-browser --detach
      - name: Deploy Gateway MCP
        env:
          RAILWAY_TOKEN: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.RAILWAY_TOKEN_PRODUCTION || secrets.RAILWAY_TOKEN_STAGING || secrets.RAILWAY_TOKEN }}
        run: railway up --service @sovereign/gateway-mcp --detach
      - name: Wait for detached Railway deploys to settle
        env:
          DEPLOY_SETTLE_SECONDS: ${{ startsWith(github.ref, 'refs/tags/v') && '60' || '30' }}
        run: |
          echo "Waiting ${DEPLOY_SETTLE_SECONDS}s for detached Railway deploys to settle..."
          sleep "${DEPLOY_SETTLE_SECONDS}"
      - name: Save deploy evidence
        run: |
          mkdir -p evidence
          echo "services=api,worker-orchestrator,worker-browser,gateway-mcp" >> evidence/deploy-backend.txt
          echo "environment=${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}" >> evidence/deploy-backend.txt
          echo "sha=${{ github.sha }}" >> evidence/deploy-backend.txt
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> evidence/deploy-backend.txt
      - uses: actions/upload-artifact@v4
        with:
          name: railway-deploy-evidence-${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
          path: evidence/

  post-deploy:
    name: Post-Deploy Migrations
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build DB package
        run: pnpm build --filter=@sovereign/db...
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.DATABASE_URL_PRODUCTION || secrets.DATABASE_URL_STAGING || secrets.DATABASE_URL }}
        run: pnpm db:migrate

  smoke:
    name: Backend Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, post-deploy]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    steps:
      - name: Run API health check
        env:
          API_BASE_URL: ${{ startsWith(github.ref, 'refs/tags/v') && vars.API_BASE_URL_PRODUCTION || vars.API_BASE_URL_STAGING }}
        run: |
          if [ -z "${API_BASE_URL}" ]; then
            echo "API_BASE_URL is empty. Configure API_BASE_URL_STAGING and API_BASE_URL_PRODUCTION in GitHub Actions variables."
            exit 1
          fi

          MAX_ATTEMPTS=10
          SLEEP_SECONDS=10
          HTTP_CODE="000"

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            echo "Health check attempt ${attempt}/${MAX_ATTEMPTS}: ${API_BASE_URL}/health"
            HTTP_CODE=$(curl -sS --connect-timeout 5 --max-time 10 -o /tmp/health.json -w "%{http_code}" "${API_BASE_URL}/health" || echo "000")
            cat /tmp/health.json 2>/dev/null || true

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Health check returned ${HTTP_CODE}; retrying in ${SLEEP_SECONDS}s..."
              sleep "${SLEEP_SECONDS}"
            fi
          done

          echo "Health check failed with status ${HTTP_CODE} after ${MAX_ATTEMPTS} attempts."
          exit 1
