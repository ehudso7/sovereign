# Railway configuration for SOVEREIGN
# Railway reads this file for each service. In this monorepo, each Railway
# service should point at its own Dockerfile in the dashboard rather than
# sharing a single repo-wide Nixpacks build.
# See infra/railway/railway.toml and docs/DEPLOY.md for setup details.

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
