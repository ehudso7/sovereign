[build]
builder = "nixpacks"
buildCommand = "NODE_ENV=development pnpm install --frozen-lockfile && pnpm build"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "sovereign-api"
startCommand = "pnpm --filter @sovereign/api start"

[[services]]
name = "sovereign-worker-orchestrator"
startCommand = "pnpm --filter @sovereign/worker-orchestrator start"

[[services]]
name = "sovereign-worker-browser"
startCommand = "pnpm --filter @sovereign/worker-browser start"

[[services]]
name = "sovereign-gateway-mcp"
startCommand = "pnpm --filter @sovereign/gateway-mcp start"
