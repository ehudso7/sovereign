# Railway configuration for SOVEREIGN
# Railway reads this file for each service. Each service overrides
# startCommand via the Railway dashboard.
# See infra/railway/railway.toml and docs/DEPLOY.md for setup details.

[build]
builder = "nixpacks"
buildCommand = "NODE_ENV=development pnpm install --frozen-lockfile && PLAYWRIGHT_BROWSERS_PATH=0 npx playwright install chromium && pnpm build"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
