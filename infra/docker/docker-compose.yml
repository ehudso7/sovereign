version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign_dev
      POSTGRES_DB: sovereign
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/var/lib/redis/data

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - '7233:7233'
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: sovereign
      POSTGRES_PWD: sovereign_dev
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - '8080:8080'
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  minio:
    image: minio/minio:latest
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: sovereign
      MINIO_ROOT_PASSWORD: sovereign_dev
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
